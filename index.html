<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI QA Wiki · 陈同学的测开知识库</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root { --primary:#0969da; --bg:#f6f8fa; --border:#d0d7de; --muted:#57606a; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont,
    "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif; color:#1f2328; }
  body { display:flex; height:100vh; overflow:hidden; }
  aside { width: 360px; min-width: 320px; border-right:1px solid var(--border);
    background:#fff; display:flex; flex-direction:column; }
  header.app { padding:14px 16px; border-bottom:1px solid var(--border); background:var(--bg); }
  header.app h1 { font-size:16px; margin:0; }
  header.app .meta { font-size:11px; color:var(--muted); margin-top:4px; }
  .tabs { display:flex; border-bottom:1px solid var(--border); background:var(--bg); }
  .tabs button { flex:1; padding:8px 12px; border:none; background:none; cursor:pointer;
    font-size:13px; color:var(--muted); border-bottom:2px solid transparent; }
  .tabs button.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
  .search { padding:10px 12px; border-bottom:1px solid var(--border); }
  .search input { width:100%; padding:7px 10px; border:1px solid var(--border);
    border-radius:6px; font-size:13px; outline:none; }
  .search input:focus { border-color:var(--primary); }
  .list { flex:1; overflow-y:auto; }
  .item { padding:10px 14px; border-bottom:1px solid #eaeef2; cursor:pointer; font-size:13px; }
  .item:hover { background:#f6f8fa; }
  .item.active { background:#ddf4ff; border-left:3px solid var(--primary); padding-left:11px; }
  .item .t { font-weight:600; color:#1f2328; line-height:1.3; }
  .item .s { font-size:11px; color:var(--muted); margin-top:4px; }
  .item .tags { margin-top:4px; }
  .item .tags span { display:inline-block; font-size:10px; padding:1px 6px; border-radius:10px;
    background:#eaeef2; color:#57606a; margin-right:3px; }
  main { flex:1; overflow-y:auto; padding:24px 36px; background:#fff; }
  main .empty { color:var(--muted); text-align:center; margin-top:120px; font-size:14px; }
  .md h1 { font-size:24px; border-bottom:1px solid var(--border); padding-bottom:8px; }
  .md h2 { font-size:18px; margin-top:24px; }
  .md h3 { font-size:15px; }
  .md p, .md li { line-height:1.7; font-size:14px; }
  .md code { background:var(--bg); padding:1px 5px; border-radius:3px; font-size:12px; }
  .md pre { background:var(--bg); padding:12px; border-radius:6px; overflow-x:auto; }
  .md pre code { background:none; padding:0; }
  .md blockquote { border-left:3px solid var(--primary); padding-left:12px; color:var(--muted);
    margin: 12px 0; }
  .md a { color:var(--primary); text-decoration:none; }
  .md a:hover { text-decoration:underline; }
  .md table { border-collapse:collapse; }
  .md th, .md td { border:1px solid var(--border); padding:6px 10px; font-size:13px; }
  .badge { display:inline-block; font-size:11px; padding:1px 6px; border-radius:3px;
    background:var(--primary); color:#fff; margin-left:6px; vertical-align:middle; }
  .src-link { float:right; font-size:11px; color:var(--muted); }
</style>
</head>
<body>
<aside>
  <header class="app">
    <h1>🦞 AI QA Wiki</h1>
    <div class="meta" id="meta">loading…</div>
  </header>
  <div class="tabs">
    <button data-tab="topics" class="active">主题 (Topics)</button>
    <button data-tab="days">每日笔记 (Days)</button>
  </div>
  <div class="search"><input id="q" placeholder="🔍 搜索（标题/标签/综述）..." /></div>
  <div class="list" id="list"></div>
</aside>
<main>
  <div id="content" class="empty">← 从左侧选一个主题或笔记开始阅读</div>
</main>

<script>
let DATA = null, TAB = "topics", QUERY = "", CURRENT = null;
const $ = (id) => document.getElementById(id);

async function loadManifest() {
  const r = await fetch("./manifest.json?_=" + Date.now());
  DATA = await r.json();
  $("meta").textContent =
    `${DATA.counts.topics} 主题（${DATA.counts.topics_with_summary} 有 LLM 综述） · ${DATA.counts.days} 天 · ${DATA.generated_at.slice(0,16)}`;
  render();
}

function filtered() {
  const q = QUERY.trim().toLowerCase();
  const items = TAB === "topics" ? DATA.topics : DATA.days;
  if (!q) return items;
  return items.filter(it => {
    const hay = TAB === "topics"
      ? (it.name + " " + (it.summary||"")).toLowerCase()
      : (it.title + " " + (it.tags||[]).join(" ") + " " + (it.preview||"")).toLowerCase();
    return hay.includes(q);
  });
}

function render() {
  const items = filtered();
  const list = $("list");
  if (TAB === "topics") {
    list.innerHTML = items.map(it => `
      <div class="item" data-path="${it.path}">
        <div class="t">${escapeHtml(it.name)} <span class="badge">${it.count}</span></div>
        ${it.summary ? `<div class="s">${escapeHtml(it.summary.slice(0,120))}…</div>` : `<div class="s" style="color:#cf222e">⚠ 暂无综述</div>`}
      </div>`).join("");
  } else {
    list.innerHTML = items.map(it => `
      <div class="item" data-path="${it.path}">
        <div class="t">${escapeHtml(it.title)}</div>
        <div class="s">${it.date || ""}</div>
        <div class="tags">${(it.tags||[]).slice(0,5).map(t=>`<span>${escapeHtml(t)}</span>`).join("")}</div>
      </div>`).join("");
  }
  list.querySelectorAll(".item").forEach(el => {
    el.addEventListener("click", () => openDoc(el.dataset.path));
    if (CURRENT === el.dataset.path) el.classList.add("active");
  });
}

async function openDoc(path) {
  CURRENT = path;
  document.querySelectorAll(".item").forEach(el =>
    el.classList.toggle("active", el.dataset.path === path));
  const r = await fetch("./" + path + "?_=" + Date.now());
  const md = await r.text();
  const ghUrl = "https://github.com/eileenchenfeng/ai-qa-wiki/blob/main/" + path;
  $("content").className = "md";
  $("content").innerHTML =
    `<div class="src-link">📄 <a href="${ghUrl}" target="_blank">在 GitHub 查看源文件</a></div>`
    + marked.parse(md);
  $("content").querySelectorAll("a[href]").forEach(a => {
    const h = a.getAttribute("href");
    if (h.startsWith("../") || h.endsWith(".md")) {
      a.addEventListener("click", e => {
        e.preventDefault();
        const cur = path.split("/"); cur.pop();
        const target = normalize(cur.concat(h.split("/")));
        openDoc(target);
      });
    }
  });
  window.scrollTo(0,0);
  $("content").scrollTop = 0;
}

function normalize(parts) {
  const out = [];
  for (const p of parts) {
    if (p === "..") out.pop();
    else if (p && p !== ".") out.push(p);
  }
  return out.join("/");
}

function escapeHtml(s) {
  return (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

document.querySelectorAll(".tabs button").forEach(b => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    TAB = b.dataset.tab;
    render();
  });
});
$("q").addEventListener("input", e => { QUERY = e.target.value; render(); });

loadManifest();
</script>
</body>
</html>
